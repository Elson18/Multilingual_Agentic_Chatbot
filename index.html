<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chat A.I+</title>

    <style>
        /* === YOUR CSS (UNCHANGED) === */
        :root {
            --bg: #e9f0fb;
            --accent1: #7c3aed;
            --accent2: #06b6d4;
            font-family: Inter, system-ui;
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: linear-gradient(180deg, var(--bg), #f7fbff)
        }

        .app {
            max-width: 1200px;
            height: calc(100vh - 40px);
            margin: 20px auto;
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 16px;
            padding: 16px;
        }

        .logo {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .btn {
            background: var(--accent1);
            color: white;
            border: 0;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn.ghost {
            background: transparent;
            color: var(--accent1);
            border: 1px solid rgba(0, 0, 0, .1);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 16px;
            padding: 16px;
        }

        .pane {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .message.user {
            justify-content: flex-end
        }

        .message.bot {
            justify-content: flex-start
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #06b6d4;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .bubble {
            max-width: 70%;
            padding: 12px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
        }

        .message.user .bubble {
            background: linear-gradient(90deg, rgba(6, 182, 212, .15), rgba(124, 58, 237, .08));
        }

        .composer {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .composer input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

   
    <div class="app">

        <aside class="sidebar">
            <div style="display:flex;gap:10px;align-items:center">
                <div class="logo">LLM</div>
                <div>
                    <strong>EchoVision</strong>
                    <div style="font-size:12px">Multilingual CyberCrime Support Using RAG and Agentic models</div>
                </div>
            </div>

            <button class="btn" style="margin-top:20px" onclick="clearChat()">+ New Chat</button>

            <div style="margin-top:auto;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <strong id="userName"></strong>
                    <div style="font-size:12px">Active</div>
                </div>
                <button class="btn ghost" onclick="logout()">Logout</button>
            </div>
        </aside>

        <main class="main">
            <div class="pane" id="pane"></div>

            <div class="composer">
                <input id="messageInput" placeholder="What's on your mind?" />
                <button class="btn" id="sendBtn">Send</button>
            </div>
        </main>

    </div>

    <script>
    /* ================= AUTH ================= */
    const username = localStorage.getItem("username");
    if (!username) location.href = "login.html";

    document.getElementById("userName").innerText = username;

    const pane = document.getElementById("pane");
    const input = document.getElementById("messageInput");
    const STORAGE_KEY = `chat_${username}`;

    /* ================= UTILS ================= */
    function formatMessage(text) {
            if (!text) return "";

            // Convert headings
            text = text
                .replace(/^###### (.*$)/gim, "<h6>$1</h6>")
                .replace(/^##### (.*$)/gim, "<h5>$1</h5>")
                .replace(/^#### (.*$)/gim, "<h4>$1</h4>")
                .replace(/^### (.*$)/gim, "<h3>$1</h3>")
                .replace(/^## (.*$)/gim, "<h2>$1</h2>")
                .replace(/^# (.*$)/gim, "<h1>$1</h1>");

            // Convert bold/italic
            text = text
                .replace(/\*\*(.*?)\*\*/gim, "<b>$1</b>")
                .replace(/\*(.*?)\*/gim, "<i>$1</i>");

            // Convert unordered lists
            text = text.replace(/^\s*-\s+(.*)$/gim, "<li>$1</li>");
            text = text.replace(/(<li>.*<\/li>)/gim, "<ul>$1</ul>");

            // Convert numbered lists
            text = text.replace(/^\s*\d+\.\s+(.*)$/gim, "<li>$1</li>");
            text = text.replace(/(<li>.*<\/li>)/gim, "<ol>$1</ol>");

            // Convert blockquotes
            text = text.replace(/^> (.*)$/gim, "<blockquote>$1</blockquote>");

            // Convert horizontal rules
            text = text.replace(/^---$/gim, "<hr>");

            // Convert line breaks
            // text = text.replace(/\n/g, "<br>");

            return text;
        }

    function saveChat() {
        localStorage.setItem(STORAGE_KEY, pane.innerHTML);
    }

    function loadChat() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            pane.innerHTML = saved;
            pane.scrollTop = pane.scrollHeight;
        }
    }

    function addMessage(text, type) {
        const msg = document.createElement("div");
        msg.className = "message " + type;
        msg.innerHTML = `
            <div class="avatar">${type === "user" ? "You" : "AI"}</div>
            <div class="bubble">${formatMessage(text)}</div>
        `;
        pane.appendChild(msg);
        pane.scrollTop = pane.scrollHeight;
        saveChat();
    }

    /* ================= CHAT ================= */
    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, "user");
        input.value = "";

        const typing = document.createElement("div");
        typing.className = "message bot";
        typing.innerHTML = `
            <div class="avatar">AI</div>
            <div class="bubble">Typing...</div>
        `;
        pane.appendChild(typing);
        pane.scrollTop = pane.scrollHeight;

        const res = await fetch("http://127.0.0.1:8000/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: text, username }) // Use username consistently
        });

        const data = await res.json();
        typing.remove();

        if (data.redirect === true) {
            addComplaintButton(data.answer);
            return;
        }

        addMessage(data.answer, "bot");
    }

    function addComplaintButton(answerText) {
        const msg = document.createElement("div");
        msg.className = "message bot";
        msg.innerHTML = `
            <div class="avatar">AI</div>
            <div class="bubble">
                ${formatMessage(answerText)}
                <br><br>
                <button class="btn" onclick="goToComplaint()">
                    <strong>File Cyber Complaint</strong>
                </button>
            </div>
        `;
        pane.appendChild(msg);
        pane.scrollTop = pane.scrollHeight;
        saveChat();
    }

    function goToComplaint() {
        window.location.href = "complaint.html";
    }

    /* ================= RETURN FROM COMPLAINT ================= */
    loadChat();

    const params = new URLSearchParams(window.location.search);
    if (params.get("from") === "complaint") {
        addMessage(
            "✅ Your cyber complaint has been submitted successfully. Our cyber team will contact you shortly.",
            "bot"
        );
        history.replaceState(null, "", "index.html");
    }

    /* ================= EVENTS ================= */
    document.getElementById("sendBtn").onclick = sendMessage;
    input.addEventListener("keydown", e => e.key === "Enter" && sendMessage());

    function clearChat() {
        localStorage.removeItem(STORAGE_KEY);
        pane.innerHTML = "";
    }

    function logout() {
        localStorage.removeItem("username");
        location.href = "login.html";
    }
</script>




</body>

</html>
