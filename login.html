<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
/* ❌ CSS NOT TOUCHED */
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #c5e6ff, #fbd6d6, #ccfdec); 
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Poppins", sans-serif;
}

.login-box {
    width: 370px;
    background: #ffffff;
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.login-box h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #2a3f66;
}

.input-field {
    margin-bottom: 18px;
}

.input-field label {
    font-size: 14px;
    color: #333;
    margin-bottom: 6px;
    display: block;
}

.input-field input {
    width: 100%;
    padding: 12px;
    border: 1px solid #bbb;
    border-radius: 10px;
    font-size: 15px;
}

.btn-login {
    width: 100%;
    padding: 12px;
    background: #4c7dff;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

.links {
    text-align: center;
    margin-top: 15px;
}
.links a {
    color: #4c7dff;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Welcome Back</h2>

    <div class="input-field">
        <label>Email or Username</label>
        <input type="text" id="username" placeholder="Enter email or username">
    </div>

    <div class="input-field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>

    <button class="btn-login" onclick="login()">Login</button>

    <div class="links">
        <p><a href="#">Forgot Password?</a></p>
        <p><a href="Signin.html">Create an Account</a></p>
    </div>
</div>

<script>
function login() {
    const identifier = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    if (!identifier || !password) {
        alert("Please fill all fields");
        return;
    }

    fetch("http://127.0.0.1:8000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ identifier, password })
    })
    .then(res => res.json().then(data => ({ status: res.status, data })))
    .then(({ status, data }) => {
        console.log("Response:", status, data);

        if (status === 200) {
            localStorage.setItem("user_id", data.user_id);
        localStorage.setItem("username", identifier); // ✅ FIX

            window.location.href = "index.html";   // ✅ REDIRECT WORKS
        } 
        else if (status === 404) {
            alert("User not found. Please create an account.");
            window.location.href = "Signin.html";
        } 
        else {
            alert(data.detail || "Invalid credentials");
        }
    })
    .catch(err => {
        console.error("Fetch failed:", err);
        alert("Server error");
    });
}
</script>


</body>
</html>
